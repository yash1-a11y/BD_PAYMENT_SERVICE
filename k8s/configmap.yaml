# Non-sensitive configuration only. No credential, key, or token belongs
# in this file — those go through secret.example.yaml's Secret instead.
apiVersion: v1
kind: ConfigMap
metadata:
  name: bd-payment-config
data:
  PACKAGE_SYSTEM_BASE_URL: "https://search.adda247.com/v13/packages/info"
  PACKAGE_SYSTEM_SRC: "aweb"
  ALLOWED_ORIGINS: '["https://your-domain.example"]'
  JWT_EXPIRE_MINUTES: "1440"
  TRANSFI_BASE_URL: "https://checkout-server.transfi.com"
  TRANSFI_PAYMENT_LINK_ID: "replace-with-real-transfi-payment-link-id"
  TRANSFI_SUCCESS_URL: "https://your-domain.example/skill-bangla/payment-status"
  TRANSFI_FAILURE_URL: "https://your-domain.example/skill-bangla/payment-status"
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
