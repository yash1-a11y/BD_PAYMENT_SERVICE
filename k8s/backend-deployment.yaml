apiVersion: apps/v1
kind: Deployment
metadata:
  name: bd-payment-backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: bd-payment-backend
  template:
    metadata:
      labels:
        app: bd-payment-backend
    spec:
      containers:
        - name: backend
          # Explicit tag — never :latest. Build via `docker build -t
          # bd-payment-backend:1.0.0 .` and push to your registry first.
          image: bd-payment-backend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            # Migrations are a deliberate, separate step in this project's
            # convention — never run automatically on every pod start.
            # Run them as a one-off `kubectl exec`/Job instead; see
            # README_DEPLOYMENT.md.
            - name: RUN_MIGRATIONS_ON_STARTUP
              value: "false"
          envFrom:
            - configMapRef:
                name: bd-payment-config
            - secretRef:
                name: bd-payment-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
