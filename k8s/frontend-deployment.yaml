apiVersion: apps/v1
kind: Deployment
metadata:
  name: bd-payment-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: bd-payment-frontend
  template:
    metadata:
      labels:
        app: bd-payment-frontend
    spec:
      containers:
        - name: frontend
          # Explicit tag — never :latest.
          #
          # IMPORTANT: NEXT_PUBLIC_API_BASE_URL is baked into this image's
          # JS bundle at build time (`docker build --build-arg
          # NEXT_PUBLIC_API_BASE_URL=...`), not read from this Deployment's
          # env at runtime. To point at a different backend URL, build and
          # push a new image tag — this manifest cannot change that value
          # on its own. See README_DEPLOYMENT.md.
          image: bd-payment-frontend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
