# TEMPLATE ONLY — deliberately named `secret.example.yaml`, not
# `secret.yaml`, so it can never be mistaken for something deployable.
#
# Do NOT fill in real values here and apply this file. Create the real
# Secret directly instead, e.g.:
#
#   kubectl create secret generic bd-payment-secrets \
#     --from-literal=DATABASE_URL='postgresql+psycopg://<user>:<password>@<host>:5432/<database>' \
#     --from-literal=JWT_SECRET='<a long random value, unique per environment>' \
#     --from-literal=TRANSFI_PUBLIC_KEY='<from the Transfi Merchant Dashboard>' \
#     --from-literal=TRANSFI_SECRET_KEY='<from the Transfi Merchant Dashboard>' \
#     --from-literal=TRANSFI_WEBHOOK_SECRET='<the dedicated webhook signing secret>'
#
# ...or manage it via a real secrets manager (Vault, Sealed Secrets,
# External Secrets Operator) instead of kubectl directly.
#
# The database is an externally-managed PostgreSQL instance — DATABASE_URL
# is the only thing this app needs to reach it; nothing here provisions or
# runs Postgres itself.
apiVersion: v1
kind: Secret
metadata:
  name: bd-payment-secrets
type: Opaque
stringData:
  DATABASE_URL: ""
  JWT_SECRET: ""
  TRANSFI_PUBLIC_KEY: ""
  TRANSFI_SECRET_KEY: ""
  TRANSFI_WEBHOOK_SECRET: ""
